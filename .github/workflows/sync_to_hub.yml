name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Настраиваем git пользователя для миграции
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          # Конвертируем тяжелые файлы в LFS-указатели, так как у HF лимит 10MB
          git lfs migrate import --yes --include="*.csv,*.pkl"
          # Пушим на Hugging Face
          git push --force https://kadzioriron:$HF_TOKEN@huggingface.co/spaces/kadzioriron/flmsuggester main
